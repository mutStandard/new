<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Full Screen Animated Pattern</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#fff;
}

.svg-wrapper{
    width:100vw;
    height:100vh;
}

svg{
    width:100%;
    height:100%;
    display:block;
}
@media (max-width:768px){

    pattern{
        width:100px;
        height:100px;
    }

}
</style>

</head>
<body>

<div class="svg-wrapper">

<svg viewBox="0 0 1920 1080" preserveAspectRatio="none">

    <defs>

        <pattern
            id="diagonal"
            width="180"
            height="180"
            patternUnits="userSpaceOnUse">

            <!-- Animate the pattern -->
            <animateTransform
                attributeName="patternTransform"
                type="translate"
                from="-180 0"
                to="0 0"
                dur="5s"
                repeatCount="indefinite"/>

            <!-- Background -->
            <rect
                width="180"
                height="180"
                fill="#d9d9d9"/>

            <!-- Stripe -->
            <polygon
                points="
                15,0
                95,0
                165,180
                85,180"
                fill="#313131"/>

        </pattern>

    </defs>

    <rect
        width="100%"
        height="100%"
        fill="url(#diagonal)"/>

</svg>

</div>

</body>
</html>

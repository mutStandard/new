<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Awwwards Style FAQ</title>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        html,
        body {

            width: 100%;
            min-height: 100%;

            font-family:
                Inter,
                "Helvetica Neue",
                Arial,
                sans-serif;

        }


        /* =========================
   SVG BACKGROUND
========================= */


        .svg-wrapper {

            position: fixed;

            inset: 0;

            width: 100%;
            height: 100%;

            z-index: -2;

        }


        svg {

            width: 100%;
            height: 100%;

        }





        /* =========================
   FAQ SECTION
========================= */


        .faq-section {

            min-height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            padding: 60px 20px;


        }

        .faq-box {
            width: min(950px, 100%);
            background: #fff;
            padding:clamp(30px, 5vw, 70px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, .18);
            animation: reveal 1s ease forwards;
        }

        @keyframes reveal {

            from {
                opacity: 0;
                transform: translateY(80px) scale(.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .faq-heading {
            display: flex;
            justify-content: space-between;
            align-items: end;
            margin-bottom: 50px;
        }
        .faq-heading h1 {
            font-size: clamp(2.5rem, 5vw, 5rem);
            line-height: .95;
            letter-spacing: -3px;
            color: #111;
        }
        .faq-heading span {
            font-size: .9rem;
            color: #777;
        }
        /* FAQ ITEMS */
        .faq-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .faq-item {
            border-bottom: 1px solid #ddd;
            overflow: hidden;
        }

        .faq-question {
            width: 100%;
            padding: 28px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: none;
            border: 0;
            cursor: pointer;
            font-size: clamp(1rem, 2vw, 1.25rem);
            font-weight: 600;
            text-align: left;
            color: #111;
        }
        .arrow {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #111;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .5s;
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height .7s cubic-bezier(.77, 0, .18, 1);
        }
        .faq-answer p {
            padding-bottom: 25px;
            max-width: 650px;
            line-height: 1.7;
            color: #555;
        }
        .faq-item.active .arrow {
            transform: rotate(45deg);
        }

        /* Mobile */

        @media(max-width:600px) {


            .faq-box {

                border-radius: 25px;

            }


            .faq-heading {

                display: block;

            }


            .faq-heading span {

                display: block;

                margin-top: 20px;

            }


        }
    </style>

</head>


<body>



    <!-- ======================
     ANIMATED SVG
======================= -->


    <div class="svg-wrapper">


        <svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">


            <defs>


                <pattern id="diagonal" width="160" height="160" patternUnits="userSpaceOnUse">



                    <animateTransform attributeName="patternTransform" type="translate" from="-160 0" to="0 0" dur="8s"
                        repeatCount="indefinite" />



                    <rect width="160" height="160" fill="#e7e7e7" />



                    <polygon points="
20,0
110,0
150,160
60,160" fill="#252525" />


                </pattern>


            </defs>



            <rect width="100%" height="100%" fill="url(#diagonal)" />


        </svg>


    </div>





    <!-- ======================
      FAQ
======================= -->


    <section class="faq-section">


        <div class="faq-box">


            <div class="faq-heading">


                <h1>
                    Questions<br>
                    & Answers
                </h1>


                <span>
                    FAQ / 2026
                </span>


            </div>



            <div class="faq-list" id="faqList"></div>



        </div>


    </section>





    <script>


        // Dynamic FAQ Data


        const faqData = [


            {

                q: "What services do you offer?",

                a: "We create premium digital experiences including websites, applications, branding systems and custom software solutions."

            },


            {

                q: "How long does development take?",

                a: "Each project is different. A typical website project takes between 2-8 weeks depending on features and complexity."

            },


            {

                q: "Can you redesign an existing website?",

                a: "Yes. We improve outdated websites by rebuilding the structure, user experience, animations and performance."

            },


            {

                q: "Do you provide maintenance?",

                a: "Yes. We offer ongoing updates, security improvements and technical support after launch."

            }


        ];





        const faqList = document.querySelector("#faqList");



        faqData.forEach(item => {


            faqList.innerHTML += `

<div class="faq-item">


<button class="faq-question">

${item.q}


<span class="arrow">
+
</span>


</button>


<div class="faq-answer">

<p>
${item.a}
</p>

</div>


</div>


`;


        });





        document.querySelectorAll(".faq-question")

            .forEach(button => {


                button.onclick = () => {


                    const item = button.parentElement;

                    const answer = item.querySelector(".faq-answer");



                    document.querySelectorAll(".faq-item")

                        .forEach(other => {


                            if (other !== item) {

                                other.classList.remove("active");

                                other.querySelector(".faq-answer")
                                    .style.maxHeight = null;

                            }


                        });



                    item.classList.toggle("active");



                    if (item.classList.contains("active")) {


                        answer.style.maxHeight =
                            answer.scrollHeight + "px";


                    }

                    else {


                        answer.style.maxHeight = null;


                    }


                };


            });



    </script>


</body>

</html>
